# ─────────────────────────────────────────────────────────────────────────────
# CORE GATEWAY (reverse proxy)
#
# Único componente autorizado a alcanzar las instancias del Core Banking.
# Los Core (bank-a/b/c) viven en la red interna `core-net` y NO publican puerto
# ni están en la red `banking-net`, de modo que el Home Banking solo puede
# llegar al Core pasando por este gateway.
#
# Enrutado por puerto, una instancia de Core por banco:
#   :8080  ->  bank-a:8080   (Banco Alpha)
#   :8081  ->  bank-b:8081   (Banco Beta)
#   :8082  ->  bank-c:8082   (Banco Gamma)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Resolver de Docker para reintentar la resolución de nombres si un Core
    # se reinicia (evita que nginx cachee una IP vieja al arrancar).
    resolver 127.0.0.11 valid=10s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;

    # ── Banco A ────────────────────────────────────────────────────────────
    server {
        listen 8080;
        location / {
            set $core_a "http://bank-a:8080";
            proxy_pass $core_a;
        }
    }

    # ── Banco B ────────────────────────────────────────────────────────────
    server {
        listen 8081;
        location / {
            set $core_b "http://bank-b:8081";
            proxy_pass $core_b;
        }
    }

    # ── Banco C ────────────────────────────────────────────────────────────
    server {
        listen 8082;
        location / {
            set $core_c "http://bank-c:8082";
            proxy_pass $core_c;
        }
    }
}
